<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Жижи и поды дешево</title>

  <!-- SEO -->
  <meta name="description" content="Самые дешевые жижи и поды. Переходи в Telegram">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at 30% 30%, #1a1a1a, #0a0a0a);
      color: #f5f5f5;
    }

    .container {
      text-align: center;
      padding: 40px;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 34px;
      font-weight: 600;
      margin-bottom: 30px;
      line-height: 1.4;
      letter-spacing: 0.5px;
    }

    .btn {
      display: inline-block;
      padding: 14px 34px;
      border-radius: 12px;
      background: linear-gradient(135deg, #ffffff, #dcdcdc);
      color: #000;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(255,255,255,0.15);
    }

    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,255,255,0.05), transparent);
      top: 20%;
      left: 20%;
      filter: blur(80px);
    }

    .age {
      position: absolute;
      bottom: 15px;
      font-size: 12px;
      opacity: 0.4;
    }
  </style>
</head>

<body>

<div class="glow"></div>

<div class="container">
  <h1>Самые дешевые жижи и поды<br>у меня в ТГК</h1>

  <a href="https://t.me/reservbroyk" class="btn" target="_blank">
    Перейти в Telegram
  </a>
</div>

<div class="age">18+</div>

</body>
</html>
